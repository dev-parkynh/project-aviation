services:
  postgres:
    image: postgres:16-alpine
    container_name: aviation-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-aviation_db}
      POSTGRES_USER: ${DB_USERNAME:-aviation}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - aviation-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-aviation} -d ${POSTGRES_DB:-aviation_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  eureka-server:
    image: ${DOCKERHUB_USERNAME}/aviation-eureka:${IMAGE_TAG:-latest}
    container_name: aviation-eureka
    environment:
      SPRING_PROFILES_ACTIVE: prod
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8761/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  gateway-service:
    image: ${DOCKERHUB_USERNAME}/aviation-gateway:${IMAGE_TAG:-latest}
    container_name: aviation-gateway
    environment:
      SPRING_PROFILES_ACTIVE: prod
      EUREKA_URI: http://eureka-server:8761/eureka/
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      eureka-server:
        condition: service_healthy
    restart: unless-stopped

  auth-service:
    image: ${DOCKERHUB_USERNAME}/aviation-auth:${IMAGE_TAG:-latest}
    container_name: aviation-auth
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-aviation_db}
      DB_USERNAME: ${DB_USERNAME:-aviation}
      DB_PASSWORD: ${DB_PASSWORD}
      EUREKA_URI: http://eureka-server:8761/eureka/
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    restart: unless-stopped

  flight-service:
    image: ${DOCKERHUB_USERNAME}/aviation-flight:${IMAGE_TAG:-latest}
    container_name: aviation-flight
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-aviation_db}
      DB_USERNAME: ${DB_USERNAME:-aviation}
      DB_PASSWORD: ${DB_PASSWORD}
      EUREKA_URI: http://eureka-server:8761/eureka/
      JWT_SECRET: ${JWT_SECRET}
      WEATHER_API_KEY: ${WEATHER_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    restart: unless-stopped

  booking-service:
    image: ${DOCKERHUB_USERNAME}/aviation-booking:${IMAGE_TAG:-latest}
    container_name: aviation-booking
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-aviation_db}
      DB_USERNAME: ${DB_USERNAME:-aviation}
      DB_PASSWORD: ${DB_PASSWORD}
      EUREKA_URI: http://eureka-server:8761/eureka/
      JWT_SECRET: ${JWT_SECRET}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      flight-service:
        condition: service_started
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: aviation-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - gateway-service
    restart: unless-stopped

volumes:
  aviation-postgres-data:
