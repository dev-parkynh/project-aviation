server:
  port: 8082

spring:
  application:
    name: flight-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/aviation_db}
    username: ${DB_USERNAME:aviation}
    password: ${DB_PASSWORD:1234}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka/}

jwt:
  secret: ${JWT_SECRET:YXZpYXRpb24tcHJvamVjdC1qd3Qtc2VjcmV0LWtleXM=}

weather:
  api:
    key: ${WEATHER_API_KEY:dummy}

logging:
  level:
    com.aviation: DEBUG
    org.hibernate.SQL: DEBUG
