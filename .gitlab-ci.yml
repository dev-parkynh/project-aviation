stages:
  - build
  - test
  - docker-build
  - deploy

variables:
  GRADLE_OPTS: "-Dorg.gradle.daemon=false"
  IMAGE_TAG: $CI_COMMIT_SHORT_SHA
  DOCKER_TLS_CERTDIR: "/certs"

.gradle-cache: &gradle-cache
  cache:
    key: "gradle-$CI_COMMIT_REF_SLUG"
    paths:
      - .gradle/wrapper/
      - .gradle/caches/

# ─── Build ────────────────────────────────────────────────────────────────────

build:
  stage: build
  image: eclipse-temurin:17-jdk
  <<: *gradle-cache
  script:
    - chmod +x gradlew
    - ./gradlew build -x test --parallel
  artifacts:
    paths:
      - eureka-server/build/libs/*.jar
      - gateway-service/build/libs/*.jar
      - auth-service/build/libs/*.jar
      - flight-service/build/libs/*.jar
      - booking-service/build/libs/*.jar
    expire_in: 1 hour

# ─── Test ─────────────────────────────────────────────────────────────────────

test:
  stage: test
  image: eclipse-temurin:17-jdk
  services:
    - name: postgres:16-alpine
      alias: postgres
  variables:
    POSTGRES_DB: aviation_db
    POSTGRES_USER: aviation
    POSTGRES_PASSWORD: "1234"
    SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/aviation_db
    DB_USERNAME: aviation
    DB_PASSWORD: "1234"
    SPRING_JPA_HIBERNATE_DDL_AUTO: create-drop
    JWT_SECRET: dGVzdC1qd3Qtc2VjcmV0LWtleS1mb3ItY2ktcGlwZWxpbmU=
    EUREKA_URI: http://localhost:8761/eureka/
  <<: *gradle-cache
  script:
    - chmod +x gradlew
    - ./gradlew test --parallel
  allow_failure: true

# ─── Docker Build & Push ──────────────────────────────────────────────────────

.docker-build: &docker-build
  stage: docker-build
  image: docker:26
  services:
    - docker:26-dind
  before_script:
    - echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

docker-build-eureka:
  <<: *docker-build
  needs:
    - job: build
      artifacts: true
  script:
    - docker build
        -t $DOCKERHUB_USERNAME/aviation-eureka:$IMAGE_TAG
        -t $DOCKERHUB_USERNAME/aviation-eureka:latest
        ./eureka-server
    - docker push $DOCKERHUB_USERNAME/aviation-eureka:$IMAGE_TAG
    - docker push $DOCKERHUB_USERNAME/aviation-eureka:latest

docker-build-gateway:
  <<: *docker-build
  needs:
    - job: build
      artifacts: true
  script:
    - docker build
        -t $DOCKERHUB_USERNAME/aviation-gateway:$IMAGE_TAG
        -t $DOCKERHUB_USERNAME/aviation-gateway:latest
        ./gateway-service
    - docker push $DOCKERHUB_USERNAME/aviation-gateway:$IMAGE_TAG
    - docker push $DOCKERHUB_USERNAME/aviation-gateway:latest

docker-build-auth:
  <<: *docker-build
  needs:
    - job: build
      artifacts: true
  script:
    - docker build
        -t $DOCKERHUB_USERNAME/aviation-auth:$IMAGE_TAG
        -t $DOCKERHUB_USERNAME/aviation-auth:latest
        ./auth-service
    - docker push $DOCKERHUB_USERNAME/aviation-auth:$IMAGE_TAG
    - docker push $DOCKERHUB_USERNAME/aviation-auth:latest

docker-build-flight:
  <<: *docker-build
  needs:
    - job: build
      artifacts: true
  script:
    - docker build
        -t $DOCKERHUB_USERNAME/aviation-flight:$IMAGE_TAG
        -t $DOCKERHUB_USERNAME/aviation-flight:latest
        ./flight-service
    - docker push $DOCKERHUB_USERNAME/aviation-flight:$IMAGE_TAG
    - docker push $DOCKERHUB_USERNAME/aviation-flight:latest

docker-build-booking:
  <<: *docker-build
  needs:
    - job: build
      artifacts: true
  script:
    - docker build
        -t $DOCKERHUB_USERNAME/aviation-booking:$IMAGE_TAG
        -t $DOCKERHUB_USERNAME/aviation-booking:latest
        ./booking-service
    - docker push $DOCKERHUB_USERNAME/aviation-booking:$IMAGE_TAG
    - docker push $DOCKERHUB_USERNAME/aviation-booking:latest

# ─── Deploy ───────────────────────────────────────────────────────────────────

deploy:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$EC2_SSH_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts
  script:
    - chmod +x deploy.sh
    - ./deploy.sh
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  needs:
    - docker-build-eureka
    - docker-build-gateway
    - docker-build-auth
    - docker-build-flight
    - docker-build-booking
  environment:
    name: production
    url: http://$EC2_HOST
