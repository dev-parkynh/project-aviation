spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/aviation_db
    username: ${DB_USERNAME:aviation}
    password: ${DB_PASSWORD:1234}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  security:
    user:
      name: admin
      password: admin

jwt:
  secret: ${JWT_SECRET:YXZpYXRpb24tcHJvamVjdC1qd3Qtc2VjcmV0LWtleXM=}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

server:
  port: 8080

logging:
  level:
    com.aviation: DEBUG
    org.hibernate.SQL: DEBUG
