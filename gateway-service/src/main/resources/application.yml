server:
  port: 8080

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/**
        - id: flight-service
          uri: lb://flight-service
          predicates:
            - Path=/api/flights/**, /api/admin/flights/**
        - id: booking-service
          uri: lb://booking-service
          predicates:
            - Path=/api/reservations/**, /api/admin/reservations/**, /api/admin/stats/**

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka/}

jwt:
  secret: ${JWT_SECRET:YXZpYXRpb24tcHJvamVjdC1qd3Qtc2VjcmV0LWtleXM=}

logging:
  level:
    com.aviation: DEBUG
    org.springframework.cloud.gateway: DEBUG
